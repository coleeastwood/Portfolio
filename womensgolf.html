<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lightbox-close">&times;</button>
<img class="lightbox-image" id="lightbox-image">
</div>

<script>
const lightbox = document.getElementById("lightbox");
const img = document.getElementById("lightbox-image");

document.querySelectorAll(".lightbox-trigger").forEach(btn=>{
btn.onclick=()=>{lightbox.classList.add("show");img.src=btn.dataset.image;}
});

document.getElementById("lightbox-close").onclick=()=>lightbox.classList.remove("show");

// VIDEO THUMBNAILS
document.querySelectorAll("video").forEach(video=>{
video.addEventListener("loadeddata",()=>{
video.currentTime=0.5;
video.addEventListener("seeked",()=>{
let c=document.createElement("canvas");
c.width=video.videoWidth;
c.height=video.videoHeight;
c.getContext("2d").drawImage(video,0,0);
video.setAttribute("poster",c.toDataURL());
},{once:true});
});
});
</script>
